<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calc-header">
            <span class="brand">Raffiakbrn.calc</span>
            <div class="header-actions">
                <button id="history-toggle" title="Lihat Riwayat">📜</button>
                <button id="theme-toggle" title="Ubah Tema">☀️</button>
            </div>
        </div>

        <div class="display-section">
            <div id="current-display">0</div>
        </div>

        <div id="history-panel" class="history-panel">
            <div class="history-header">
                <h3>Riwayat</h3>
                <button id="clear-history-btn">Hapus semua</button>
            </div>
            <div id="history-list" class="history-list">
                <div class="empty-history">Belum ada riwayat</div>
            </div>
        </div>

        <div class="keypad">
            <button class="btn func" data-action="clear">C</button>
            <button class="btn func" data-action="backspace">⌫</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn operator" data-value="÷">÷</button>

            <button class="btn num" data-value="7">7</button>
            <button class="btn num" data-value="8">8</button>
            <button class="btn num" data-value="9">9</button>
            <button class="btn operator" data-value="×">×</button>

            <button class="btn num" data-value="4">4</button>
            <button class="btn num" data-value="5">5</button>
            <button class="btn num" data-value="6">6</button>
            <button class="btn operator" data-value="-">-</button>

            <button class="btn num" data-value="1">1</button>
            <button class="btn num" data-value="2">2</button>
            <button class="btn num" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn num zero" data-value="0">0</button>
            <button class="btn num" data-value=".">.</button>
            <button class="btn operator-equal" data-action="calculate">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
